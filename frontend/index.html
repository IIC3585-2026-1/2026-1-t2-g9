<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Metflix</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

  <h1 class="logo">METFLIX</h1>

  <div class="filters">
    <select id="genre">
      <option value="">Todos</option>
      <option value="Sci-Fi">Sci-Fi</option>
      <option value="Drama">Drama</option>
      <option value="Romance">Romance</option>
    </select>

    <input id="rating" type="number" step="0.1" placeholder="Rating mínimo">

    <select id="order">
      <option value="">Orden</option>
      <option value="asc">Rating ↑</option>
      <option value="desc">Rating ↓</option>
    </select>

    <button onclick="runQuery()">Filtrar</button>
  </div>

  <div id="movies" class="grid"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
